name: yggdrasil-dev

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: yggdrasil
      POSTGRES_PASSWORD: yggdrasil
      POSTGRES_DB: yggdrasil
    ports:
      - "${YG_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yggdrasil"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    # Last release with the full community console; the S3 API is what matters here.
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: yggdrasil
      MINIO_ROOT_PASSWORD: yggdrasil
    ports:
      - "${YG_MINIO_PORT:-9000}:9000"
      - "${YG_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      # MinIO's documented container healthcheck. "local" is one of mc's
      # built-in default aliases (http://localhost:9000) — no alias init is
      # needed, and `mc ready` probes the unauthenticated health API.
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 12

  # One-shot: creates the Shard bucket so a clean stack is immediately usable.
  # Reuses the minio image because it ships mc; no extra image to pin.
  minio-init:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - mc alias set dev http://minio:9000 yggdrasil yggdrasil && mc mb --ignore-existing dev/yggdrasil
    restart: "no"

  # Reference single-node deployment. Profile-gated so the existing backing-
  # service-only development flow is unchanged.
  server:
    profiles: [deployment]
    image: "${YG_IMAGE:-yggdrasil:local}"
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    environment:
      YG_LISTEN: 0.0.0.0:7311
      YG_DATABASE_URL: postgres://yggdrasil:yggdrasil@postgres:5432/yggdrasil
      YG_S3_ENDPOINT: http://minio:9000
      YG_S3_BUCKET: yggdrasil
      YG_S3_ACCESS_KEY: yggdrasil
      YG_S3_SECRET_KEY: yggdrasil
      YG_S3_REGION: us-east-1
      YG_BOOTSTRAP_TOKEN: "${YG_BOOTSTRAP_TOKEN:-}"
      YG_CURSOR_SECRET: "${YG_CURSOR_SECRET:-}"
      # Forge credential for private clones and org discovery; workers
      # read it directly, and compose does not forward host env unasked.
      YG_GITHUB_TOKEN: "${YG_GITHUB_TOKEN:-}"
    ports:
      - "127.0.0.1:${YG_SERVER_PORT:-7311}:7311"
    volumes:
      - server-git-cache:/var/lib/yggdrasil/git
      - server-shard-cache:/var/lib/yggdrasil/shard-cache
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - YG_SERVER=http://127.0.0.1:7311 YG_TOKEN="$${YG_BOOTSTRAP_TOKEN}" /usr/local/bin/yg status --json >/dev/null
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 5s
    restart: unless-stopped
    # Several seconds past the application's 30s drain deadline, so the
    # final lease-release cleanup is never raced by Docker's SIGKILL.
    stop_grace_period: 40s

volumes:
  postgres-data:
  minio-data:
  server-git-cache:
  server-shard-cache:
