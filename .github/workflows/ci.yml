name: CI

on:
  pull_request:
  push:
    branches: [main]

# All jobs only read the checkout; nothing needs a writable token.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Everything that needs no services: a formatting or lint failure
  # fails here in minutes, without ever pulling the compose images.
  checks:
    name: fmt + clippy + doc + in-crate tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      # Reads rust-toolchain.toml (pinned version + components) and caches.
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          # Warnings are denied via clippy/RUSTDOCFLAGS; keep the action from
          # injecting RUSTFLAGS so CI matches the documented local checks.
          rustflags: ""
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo doc --workspace --no-deps --locked
        env:
          RUSTDOCFLAGS: -D warnings
      # Every test outside the yg-cli e2e package runs without Postgres
      # or MinIO; a service-needing test added to another crate breaks
      # this job loudly instead of silently serializing CI again. The
      # yg binary's own unit tests are service-free too — only yg-cli's
      # integration targets need the stack.
      - run: cargo test --workspace --exclude yg-cli --locked
      - run: cargo test -p yg-cli --bins --locked

  image:
    name: container image
    # Gated like e2e: a release image build is at least as expensive as
    # the compose stack, so a formatting or lint failure never spends it.
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build the release image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          push: false
          tags: yggdrasil:ci
          # Honest scope: this caches the base/apt layers only. The cargo
          # build layer is invalidated by any crates/ change (the RUN
          # --mount=type=cache dirs are ephemeral to the builder and never
          # exported), so code PRs pay a cold release compile.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # The e2e suites exercise real server processes against the compose
  # Postgres + MinIO stack. Gated on the cheap job so a formatting or
  # lint failure never spends the compose stack.
  e2e:
    name: e2e
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: ""
      # Two steps: older compose versions fail `up --wait` when the
      # one-shot minio-init service exits (even successfully).
      - run: docker compose up -d --wait postgres minio
      - run: docker compose run --rm minio-init
      - run: cargo test -p yg-cli --locked
